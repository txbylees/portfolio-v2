<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reprod</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #111;
      background: #fff;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid #f0f0f0;
    }
    .logo { font-weight: 700; font-size: 15px; letter-spacing: -0.3px; }
    .badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 99px;
      background: #dcfce7;
      color: #16a34a;
    }
    .badge.disconnected { background: #fef2f2; color: #dc2626; }
    .body { padding: 14px 16px; }
    .capture-btn {
      width: 100%;
      padding: 10px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .capture-btn:hover { background: #1d4ed8; }
    .capture-btn:disabled { background: #94a3b8; cursor: not-allowed; }
    .shortcut {
      font-size: 11px;
      color: #94a3b8;
      text-align: center;
      margin-top: 8px;
    }
    .divider { border: none; border-top: 1px solid #f0f0f0; margin: 14px 0; }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 5px;
    }
    .field input {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      font-size: 12px;
      font-family: 'SF Mono', monospace;
      outline: none;
    }
    .field input:focus { border-color: #2563eb; }
    .save-btn {
      margin-top: 10px;
      width: 100%;
      padding: 8px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      color: #374151;
    }
    .save-btn:hover { background: #f1f5f9; }
    .saved-msg { font-size: 11px; color: #16a34a; text-align: center; margin-top: 6px; height: 14px; }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">Reprod</span>
    <span id="badge" class="badge disconnected">Not configured</span>
  </div>
  <div class="body">
    <button id="capture-btn" class="capture-btn" disabled>
      Capture Bug
    </button>
    <p class="shortcut">or press <kbd>Ctrl+Shift+U</kbd></p>

    <hr class="divider" />

    <div class="field">
      <label>API Key</label>
      <input id="api-key" type="password" placeholder="rpk_••••••••••••" autocomplete="off" />
    </div>
    <button id="save-btn" class="save-btn">Save</button>
    <p id="saved-msg" class="saved-msg"></p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
