<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reprod</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #111827;
      background: #fff;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid #f3f4f6;
    }
    .logo-mark {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #166534;
      box-shadow: 0 0 10px rgba(22, 101, 52, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .logo-mark::after {
      content: '';
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #fff;
    }
    .logo { font-weight: 700; font-size: 15px; letter-spacing: -0.3px; }
    .spacer { flex: 1; }
    .badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 99px;
      background: #dcfce7;
      color: #166534;
    }
    .badge.disconnected { background: #fef2f2; color: #dc2626; }
    .body { padding: 14px 16px 16px; }
    .capture-btn {
      width: 100%;
      padding: 10px;
      background: #166534;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.15s;
    }
    .capture-btn:hover { background: #14532d; }
    .capture-btn:disabled { background: #d1d5db; cursor: not-allowed; }
    .shortcut {
      font-size: 11px;
      color: #9ca3af;
      text-align: center;
      margin-top: 8px;
    }
    kbd {
      font-family: inherit;
      font-size: 10px;
      font-weight: 600;
      color: #4b5563;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-bottom-width: 2px;
      border-radius: 4px;
      padding: 1px 5px;
    }
    .divider { border: none; border-top: 1px solid #f3f4f6; margin: 14px 0; }
    .field { margin-bottom: 10px; }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 5px;
    }
    .field input {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      font-size: 12px;
      font-family: 'SF Mono', ui-monospace, monospace;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .field input:focus {
      border-color: #16a34a;
      box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.12);
    }
    .field .hint { font-size: 10px; color: #9ca3af; margin-top: 4px; }
    .save-btn {
      width: 100%;
      padding: 8px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      color: #374151;
      transition: background 0.15s;
    }
    .save-btn:hover { background: #f3f4f6; }
    .saved-msg { font-size: 11px; color: #16a34a; text-align: center; margin-top: 6px; height: 14px; }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo-mark"></span>
    <span class="logo">Reprod</span>
    <span class="spacer"></span>
    <span id="badge" class="badge disconnected">Not configured</span>
  </div>
  <div class="body">
    <button id="capture-btn" class="capture-btn" disabled>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3" />
        <path d="M12 3v3M12 18v3M3 12h3M18 12h3" />
      </svg>
      Capture Bug
    </button>
    <p class="shortcut">or press <kbd>Ctrl</kbd> + <kbd>Shift</kbd> + <kbd>U</kbd></p>

    <hr class="divider" />

    <div class="field">
      <label for="api-key">API Key</label>
      <input id="api-key" type="password" placeholder="rpk_••••••••••••" autocomplete="off" />
      <p class="hint">Project → API Keys in your Reprod dashboard</p>
    </div>
    <div class="field">
      <label for="endpoint">Dashboard URL</label>
      <input id="endpoint" type="text" placeholder="http://localhost:3000" autocomplete="off" />
      <p class="hint">Where captures are sent — leave blank for localhost</p>
    </div>
    <button id="save-btn" class="save-btn">Save</button>
    <p id="saved-msg" class="saved-msg"></p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
